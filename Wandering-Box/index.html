<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="icon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />

    <title>Wandering BOX</title>
  </head>
  <body>
    <div class="homepage">
      <div class="title">
        <span class="half">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="48px"
            viewBox="0 -960 960 960"
            width="48px"
            fill="#3737ff"
          >
            <path
              d="M180-120q-24 0-42-18t-18-42v-600q0-24 18-42t42-18h600q24 0 42 18t18 42v600q0 24-18 42t-42 18H180Zm0-60h600v-600H180v600Zm0 0v-600 600Z"
            /></svg
          >WANDERING
        </span>
        <span class="other"> BOX </span>
        <hr />
        <h5>Test your reflexes and precision.</h5>
        <h5>Hover. Chase. Click. Don't Miss.</h5>
      </div>
      <div class="btn">
        <button id="btn">
          START GAME
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="30px"
            viewBox="0 -960 960 960"
            width="30px"
            fill="#f9fafb"
          >
            <path
              d="M320-273v-414q0-17 12-28.5t28-11.5q5 0 10.5 1.5T381-721l326 207q9 6 13.5 15t4.5 19q0 10-4.5 19T707-446L381-239q-5 3-10.5 4.5T360-233q-16 0-28-11.5T320-273Z"
            />
          </svg>
        </button>
      </div>
      <h3>Made in pure HTML, CSS, JS</h3>
    </div>
    <div class="gamepage" style="display: none">
      <div class="container">
        <div class="stats">
          <span class="Timer">
            <span>Timer : </span>
            <span class="timer_countdown">0 </span>
          </span>
          <span class="Score">
            <span>Score : </span>
            <span class="score_countdown">0 </span>
          </span>
        </div>
        <div class="gameCont">
          <div class="gameBox">CLICK ME!</div>
        </div>
        <div class="gameBtn">
          <button id="gameBtn">START</button>
        </div>
      </div>
    </div>
    <div class="scorepage" style="display: none">
      <div class="scoreCont">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="24px"
          viewBox="0 -960 960 960"
          width="24px"
          fill="#EA3323"
        >
          <path
            d="m336-280 144-144 144 144 56-56-144-144 144-144-56-56-144 144-144-144-56 56 144 144-144 144 56 56ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"
          />
        </svg>
        <h1>GAME OVER</h1>
        <hr />
        <div class="OverScore">
          <span>Score</span>
          <span class="scoreDisplay">0 </span>
        </div>
        <span class="redirect">
          <span>Redirecting to Main Menu in </span
          ><span class="overCounter">5</span><span> secs...</span>
        </span>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
